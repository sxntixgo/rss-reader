services:
  web:
    build: .
    ports:
      - "5001:5000"  # Tailscale on Windows host exposes this to your Tailnet
    volumes:
      - ./data:/app/data        # SQLite DB persists across rebuilds
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Required for Linux containers to reach Windows host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
